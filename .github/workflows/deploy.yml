name: Deploy Web

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy-web:
    runs-on: self-hosted
    defaults:
      run:
        shell: bash
    env:
      DEPLOY_BASE_DIR: ${{ vars.WEB_DEPLOY_BASE_DIR }}
      WEB_ENV_FILE: ${{ vars.WEB_ENV_FILE }}
      WEB_PM2_APP_NAME: ${{ vars.WEB_PM2_APP_NAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Deploy Web Single Version
        run: |
          set -euo pipefail

          if [[ -z "${DEPLOY_BASE_DIR:-}" ]]; then
            echo "WEB_DEPLOY_BASE_DIR is required"
            exit 1
          fi

          if [[ -z "${WEB_ENV_FILE:-}" || ! -f "$WEB_ENV_FILE" ]]; then
            echo "WEB_ENV_FILE is required and must exist"
            exit 1
          fi

          if [[ -z "${WEB_PM2_APP_NAME:-}" ]]; then
            echo "WEB_PM2_APP_NAME is required"
            exit 1
          fi

          if ! command -v pm2 >/dev/null 2>&1; then
            echo "pm2 is required on runner host"
            exit 1
          fi

          deploy_dir="$DEPLOY_BASE_DIR/current"
          logs_dir="$DEPLOY_BASE_DIR/logs"
          log_file="$logs_dir/${WEB_PM2_APP_NAME}.log"

          mkdir -p "$deploy_dir" "$logs_dir"

          rsync -a --delete \
            --exclude ".git" \
            --exclude ".github" \
            --exclude "node_modules" \
            --exclude ".next" \
            "$GITHUB_WORKSPACE/" "$deploy_dir/"

          cp "$WEB_ENV_FILE" "$deploy_dir/.env"

          web_port="$(awk -F= '/^PORT=/{print $2}' "$deploy_dir/.env" | tail -n 1 | tr -d '\r' | sed -e 's/^"//' -e 's/"$//' -e "s/^'//" -e "s/'$//")"
          if [[ -z "$web_port" ]]; then
            echo "PORT is required in WEB_ENV_FILE"
            exit 1
          fi

          pushd "$deploy_dir" >/dev/null
          npm ci
          npm run build
          popd >/dev/null

          pm2 delete "$WEB_PM2_APP_NAME" >/dev/null 2>&1 || true

          pushd "$deploy_dir" >/dev/null
          PORT="$web_port" pm2 start node_modules/next/dist/bin/next --name "$WEB_PM2_APP_NAME" --time --output "$log_file" --error "$log_file" -- start -p "$web_port"
          pm2 save
          popd >/dev/null

          if ! pm2 describe "$WEB_PM2_APP_NAME" >/dev/null 2>&1; then
            echo "pm2 process was not started"
            exit 1
          fi

          echo "deploy finished on port $web_port"

  validate-web-public-url:
    runs-on: ubuntu-latest
    needs: deploy-web
    steps:
      - name: Validate Web public URL
        run: |
          set -euo pipefail
          web_url="https://organizandotudo.thaleslj.com"
          curl -fsSL --retry 10 --retry-delay 3 --retry-all-errors "$web_url" >/dev/null
